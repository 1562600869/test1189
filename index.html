<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打砖块</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="hud">
            <span id="score">得分: 0</span>
            <span id="lives">生命: 3</span>
            <span id="high-score">最高分: 0</span>
        </div>
        <canvas id="gameCanvas" width="780" height="560"></canvas>
        <div id="overlay" class="hidden">
            <div id="overlay-content">
                <h2 id="overlay-title"></h2>
                <p id="overlay-score"></p>
                <p id="overlay-record" class="hidden"></p>
                <p id="overlay-hint">点击重新开始</p>
            </div>
        </div>
        <div id="pause-overlay" class="hidden">
            <div id="pause-content">
                <h2>暂停中</h2>
                <p>按空格键继续</p>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
